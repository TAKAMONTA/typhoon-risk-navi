<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>沖縄台風ナビ - Demo</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 20px; background: #f5f5f5; }
    .container { max-width: 900px; margin: 0 auto; }
    .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .typhoon { background: #fff3e0; border-left: 6px solid #ff9800; }
    .risk-high { border-left-color: #f44336; background: #ffebee; }
    .risk-medium { border-left-color: #ff9800; background: #fff8e1; }
    .risk-low { border-left-color: #4caf50; background: #e8f5e9; }
    h1 { margin-top: 0; }
    .location { margin: 12px 0; padding: 12px; border-radius: 8px; }
    .risk-level { font-weight: bold; padding: 4px 12px; border-radius: 20px; display: inline-block; font-size: 14px; }
    .severe { background: #f44336; color: white; }
    .high { background: #ff9800; color: white; }
    .medium { background: #ffc107; }
    .low { background: #4caf50; color: white; }
    .meta { color: #666; font-size: 13px; }

    #status {
      padding: 12px 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .status-connecting { background: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
    .status-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .status-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌪️ 沖縄台風ナビ (Demo)</h1>

    <div id="status" class="status-connecting">
      <span>🔄 バックエンドに接続中...</span>
      <button onclick="loadDemo()" style="margin-left: auto; padding: 6px 14px; border-radius: 6px; border: none; background: #333; color: white; cursor: pointer;">再試行</button>
    </div>
    
    <div id="typhoon-card" class="card typhoon" style="display: none;">
      <h2>現在の台風</h2>
      <div id="typhoon-info"></div>
    </div>

    <div class="card" style="display: none;">
      <h2>保存場所のリスク</h2>
      <div id="risks"></div>
    </div>

    <div class="meta">
      このデモは架空の台風6号（Jangmi）のデータを使用しています。<br>
      実際のデータ取得は現在開発中です。
    </div>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const typhoonCard = document.getElementById('typhoon-card');
    const risksCard = document.querySelector('.card:last-of-type');

    async function loadDemo() {
      statusEl.className = 'status-connecting';
      statusEl.innerHTML = `
        <span>🔄 バックエンドに接続中...</span>
        <button onclick="loadDemo()" style="margin-left: auto; padding: 6px 14px; border-radius: 6px; border: none; background: #333; color: white; cursor: pointer;">再試行</button>
      `;

      try {
        const res = await fetch('http://localhost:3000/api/demo/state');
        
        if (!res.ok) throw new Error('Server responded with ' + res.status);

        const data = await res.json();

        // 成功
        statusEl.className = 'status-success';
        statusEl.innerHTML = `
          <span>✅ バックエンド接続成功！ (ポート3000)</span>
        `;

        typhoonCard.style.display = 'block';
        risksCard.style.display = 'block';

        // 台風情報
        const typhoonEl = document.getElementById('typhoon-info');
        typhoonEl.innerHTML = `
          <strong>${data.typhoon.nameJa || data.typhoon.name}</strong> (${data.typhoon.id})<br>
          現在位置: ${data.typhoon.currentCenter.lat}°N, ${data.typhoon.currentCenter.lon}°E<br>
          最大風速: ${data.typhoon.maxWindSpeed} m/s<br>
          最終更新: ${new Date(data.lastUpdated).toLocaleString('ja-JP')}
        `;

        // リスク一覧
        const risksEl = document.getElementById('risks');
        risksEl.innerHTML = data.risks.map(r => {
          const levelClass = r.riskLevel.toLowerCase();
          const levelText = { SEVERE: '極めて高い', HIGH: '高い', MEDIUM: '中', LOW: '低い' }[r.riskLevel] || r.riskLevel;
          
          let html = `
            <div class="location risk-${levelClass}">
              <strong>${r.locationName}</strong>
              <span class="risk-level ${levelClass}">${levelText}</span><br>
              <small>現在地からの距離: ${r.currentDistanceKm}km</small><br>
          `;
          
          if (r.hoursToStrongWind) {
            html += `<small>強風域到達まで: 約${r.hoursToStrongWind.toFixed(1)}時間</small><br>`;
          }
          if (r.distanceToClosestKm) {
            html += `<small>最接近距離: 約${r.distanceToClosestKm}km</small>`;
          }
          html += `</div>`;
          return html;
        }).join('');

      } catch (e) {
        statusEl.className = 'status-error';
        statusEl.innerHTML = `
          <span>❌ バックエンドに接続できません</span>
          <button onclick="loadDemo()" style="margin-left: auto; padding: 6px 14px; border-radius: 6px; border: none; background: #721c24; color: white; cursor: pointer;">再試行</button>
        `;

        const typhoonEl = document.getElementById('typhoon-info');
        typhoonEl.innerHTML = `
          ターミナルで以下を実行してください：<br><br>
          <code style="background:#f4f4f4;padding:8px 12px;border-radius:6px;display:block;">
            cd /Users/taka/typhoon-risk-navi/backend<br>
            bun run index.ts
          </code>
        `;
        typhoonCard.style.display = 'block';
        risksCard.style.display = 'none';
      }
    }

    loadDemo();
    setInterval(loadDemo, 30000);
  </script>
</body>
</html>
