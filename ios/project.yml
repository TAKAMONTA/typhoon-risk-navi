name: TyphoonRiskNavi
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: ja
  createIntermediateGroups: true
  generateEmptyDirectories: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
    SUPPORTS_MACCATALYST: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO     # 我々の Info.plist を使う
    MARKETING_VERSION: "0.9.0"
    CURRENT_PROJECT_VERSION: "2"
    DEVELOPMENT_TEAM: "J3U2LZ2886"  # TAKAYUKI NAKAIMA
    CODE_SIGN_STYLE: Automatic

targets:
  TyphoonRiskNavi:
    type: application
    platform: iOS
    sources:
      - path: TyphoonRiskNavi
        excludes:
          # Info.plist は INFOPLIST_FILE 経由で扱うので Copy Bundle Resources から除外
          - "Info.plist"
    resources:
      - path: TyphoonRiskNavi/Resources/PrivacyInfo.xcprivacy
      - path: TyphoonRiskNavi/Resources/ja.lproj
      - path: TyphoonRiskNavi/Resources/en.lproj
      - path: TyphoonRiskNavi/Resources/Assets.xcassets
    # 注意: `info:` は指定しない。XcodeGen に Info.plist を自動生成させると
    # NSLocationWhenInUseUsageDescription が消えるため、TyphoonRiskNavi/Info.plist を
    # INFOPLIST_FILE 経由でそのまま使う。
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.OkinawaTyphoonNavi
        PRODUCT_NAME: TyphoonRiskNavi
        INFOPLIST_FILE: TyphoonRiskNavi/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: YES
    dependencies: []

  TyphoonRiskNaviTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TyphoonRiskNaviTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.OkinawaTyphoonNaviTests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: TyphoonRiskNavi

schemes:
  TyphoonRiskNavi:
    build:
      targets:
        TyphoonRiskNavi: all
        TyphoonRiskNaviTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TyphoonRiskNaviTests
